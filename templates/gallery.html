<!DOCTYPE html>
<html lang="zh">
<head>
    <title>文档浏览</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.css">
    <link rel="stylesheet" href="/src/viewer.css">
</head>
<body>

    <div class="viewport">
        <div id="loadingState">
            <div class="spinner"></div>
            <div id="loadingText">正在获取文档列表...</div>
        </div>
        <img id="displayedImage" alt="Document Page">
    </div>

    <div class="toolbar">
        <div>
            <button id="btnPrev" onclick="changeImage(-1)" disabled>Prev</button>
        </div>
        <div class="group-center">
            <span class="page-info">
                <span id="current" style="color: var(--accent-color); font-size: 1.1em;">-</span>
                / <span id="total">-</span>
            </span>
            <div style="font-size: 10px; color: #666; margin-top: 2px;">
                Step: <input type="number" id="stepInput" min="1" value="1">
            </div>
        </div>
        <div>
            <button id="btnNext" onclick="changeImage(1)" disabled>Next</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.js"></script>
    <script>
        // 状态变量
        let images = [];
        let currentIndex = 0;
        let viewerInstance = null;
        let docId = null;

        // DOM 元素
        const imgElement = document.getElementById("displayedImage");
        const loadingState = document.getElementById("loadingState");
        const loadingText = document.getElementById("loadingText");
        const currentEl = document.getElementById("current");
        const totalEl = document.getElementById("total");
        const btnPrev = document.getElementById("btnPrev");
        const btnNext = document.getElementById("btnNext");

        // 1. 从 URL 提取 document_id
        function getDocumentId() {
            // 兼容 /show_document/123 或 /show_document/123/ 等格式
            const pathSegments = window.location.pathname.split('/').filter(p => p.length > 0);
            // 假设 URL 结构是 .../show_document/{id}，取最后一个数字部分
            // 或者你可以使用正则：const match = window.location.pathname.match(/\/show_document\/(\d+)/);
            const id = pathSegments.pop();
            if (!isNaN(id)) {
                return id;
            }
            // 如果 pop 出来不是数字（比如有 query params），尝试再往前找
            return pathSegments.find(s => !isNaN(s)) || null;
        }

        // 2. 初始化：获取数据
        async function init() {
            docId = getDocumentId();
            if (!docId) {
                showError("URL 错误：无法获取文档 ID");
                return;
            }

            try {
                // 请求后端 API
                const response = await fetch(`/api/documents/${docId}`);

                if (!response.ok) {
                    const errJson = await response.json();
                    throw new Error(errJson.detail || `Server Error: ${response.status}`);
                }

                let document_meta = await response.json();
                images = document_meta.document_pages;

                if (!Array.isArray(images) || images.length === 0) {
                    throw new Error("文档内容为空");
                }

                // 数据加载成功
                loadingState.style.display = 'none';
                totalEl.innerText = images.length;
                btnPrev.disabled = false;
                btnNext.disabled = false;

                // 加载第一张图
                updateImage();
                initViewer();
                preloadImages(3);

            } catch (err) {
                console.error(err);
                showError(err.message);
            }
        }

        function showError(msg) {
            loadingText.innerText = msg;
            loadingText.style.color = '#ff5252';
            document.querySelector('.spinner').style.display = 'none';
        }

        // 3. 核心功能
        function initViewer() {
            if (viewerInstance) return;
            viewerInstance = new Viewer(imgElement, {
                inline: false,
                button: true,
                navbar: false,
                title: false,
                toolbar: {
                    zoomIn: 1, zoomOut: 1, oneToOne: 1, reset: 1,
                    rotateLeft: 1, rotateRight: 1
                },
                transition: false,
                backdrop: 'rgba(0,0,0,0.95)',
            });
        }

        function updateImage() {
            imgElement.style.opacity = '0.5';
            currentEl.innerText = (currentIndex + 1).toString();

            // 构造新的 src
            // 注意：API 返回的如果是相对路径 (如 "/document_content/1/0") 直接使用
            // 如果 API 返回的是文件名，你需要手动拼 URL
            const newSrc = images[currentIndex];

            // 为了防止 Viewer.js 在图片未加载时出现闪烁，使用 Image 对象预加载
            const tempImg = new Image();
            tempImg.onload = () => {
                imgElement.src = newSrc;
                imgElement.style.opacity = '1';
                if (viewerInstance) viewerInstance.update();
            };
            tempImg.onerror = () => {
                imgElement.alt = "加载失败";
                imgElement.style.opacity = '1';
            };
            tempImg.src = newSrc;
        }

        function changeImage(direction) {
            if (images.length === 0) return;

            let step = parseInt(document.getElementById("stepInput").value) || 1;
            currentIndex += direction * step;

            // 循环翻页逻辑（可选，如果不想要循环，改为边界锁定）
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= images.length) currentIndex = images.length - 1;

            updateImage();
            preloadImages(2);
        }

        // 预加载
        function preloadImages(limit = 2) {
            for (let i = 1; i <= limit; i++) {
                let nextIndex = currentIndex + i;
                if (nextIndex < images.length) {
                    new Image().src = images[nextIndex];
                }
            }
        }

        // 交互事件监听
        window.onload = init;

        document.addEventListener('keydown', (e) => {
            if (document.querySelector('.viewer-in')) return;
            if (e.key === 'ArrowLeft') changeImage(-1);
            else if (e.key === 'ArrowRight') changeImage(1);
        });

        // 触摸滑动
        let touchStartX = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            if (document.body.classList.contains('viewer-open')) return;
            const delta = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(delta) > 60) {
                if (delta > 0) changeImage(-1);
                else changeImage(1);
            }
        });
    </script>
</body>
</html>
