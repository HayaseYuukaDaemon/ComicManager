<!DOCTYPE html>
<html lang="zh">
<head>
    <title>文档浏览</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.css">
    <link rel="stylesheet" href="/src/viewer.css">
</head>
<body>

    <div class="viewport">
        <div id="loadingState">
            <div class="spinner"></div>
            <div id="loadingText">正在获取文档列表...</div>
        </div>
        <img id="displayedImage" alt="Document Page">
    </div>

    <div class="toolbar">
        <div>
            <button id="btnPrev" onclick="changeImage(-1)" disabled>Prev</button>
        </div>
        <div class="group-center">
            <span class="page-info">
                <span id="current" style="color: var(--accent-color); font-size: 1.1em;">-</span>
                / <span id="total">-</span>
            </span>
            <div style="font-size: 10px; color: #666; margin-top: 2px;">
                Step: <input type="number" id="stepInput" min="1" value="1">
            </div>
        </div>
        <div>
            <button id="btnNext" onclick="changeImage(1)" disabled>Next</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.js"></script>
    <script src="/src/dmb-viewer.js"></script>
</body>
</html>
